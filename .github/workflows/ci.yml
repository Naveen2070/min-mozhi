# CI from the first commit (decision D5, docs/log/2026-06-10.md).
# Activates automatically once the repo is pushed to GitHub.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # Manual "run the perf batch" button (Actions tab → CI → Run workflow).
  workflow_dispatch:
  schedule:
    # Weekly extended fuzz run (Mon 04:00 UTC) — drives `fuzz-nightly` only.
    - cron: "0 4 * * 1"
    # Nightly perf batch is still disabled. Uncomment to schedule it (03:00
    # UTC); `nightly-bench` is gated on exactly this cron so the weekly fuzz
    # schedule above never triggers the perf batch.
    # - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rustdoc (warnings are errors)
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Tests
        # REQUIRE_IVERILOG turns a missing Icarus install into a hard
        # failure — CI must never silently skip the differential tests.
        run: cargo test --all-targets
        env:
          REQUIRE_IVERILOG: "1"

      - name: Build
        run: cargo build

      - name: Compile benches (criterion harness must not bit-rot)
        # --no-run type-checks benches/compile.rs without timing anything —
        # microbench timings on shared runners are too noisy to gate on.
        run: cargo bench --no-run

  bench:
    name: mimz-bench correctness gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run mimz-bench (exit code is the gate)
        # Non-zero on any accuracy/safety failure: goldens, 4-flavor
        # byte-identity, error fixtures, no-false-positives. --no-cov skips the
        # slow llvm-cov rerun; --no-icarus because the Icarus differential
        # layer is already hard-gated in `check` via REQUIRE_IVERILOG.
        # --history to a temp path so the gate never touches the committed
        # bench-history.jsonl (only the perf batch records history).
        run: >
          cargo run --release --bin mimz-bench --
          --no-cov --no-icarus
          --history "${{ runner.temp }}/bench-history.jsonl"

  nightly-bench:
    name: perf batch (manual / nightly)
    runs-on: ubuntu-latest
    # Manual dispatch, plus the perf cron IF re-enabled above. Gated on the exact
    # perf cron so the weekly fuzz schedule never triggers the perf batch.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    # Needed so the bot can commit the appended history back to the repo.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run mimz-bench batch (500 iterations)
        # Appends one line to the tracked bench-history.jsonl (present from the
        # checkout, or created on the first run).
        run: cargo run --release --bin mimz-bench -- --no-cov --iterations 500

      - name: Commit history back to the repo
        # `[skip ci]` so this bot push does NOT re-trigger the workflow.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add bench-history.jsonl
          git diff --staged --quiet || git commit -m "chore(bench): perf history ${GITHUB_SHA::7} [skip ci]"
          git push

      - name: Upload report
        uses: actions/upload-artifact@v6
        with:
          name: bench-report
          path: |
            bench-report.html
            bench-report.json

  fuzz:
    name: fuzz smoke (eval + compile)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      # cargo-fuzz / libFuzzer need nightly; the lib itself stays on stable.
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus from examples
        # Give libFuzzer a known-good starting corpus (flattened names so the
        # same base file across flavor folders doesn't collide).
        run: |
          for t in lex_parse_eval lex_parse_compile pretty_roundtrip; do
            mkdir -p "fuzz/corpus/$t"
            for f in $(find examples -name '*.mimz'); do cp "$f" "fuzz/corpus/$t/${f//\//_}"; done
          done

      - name: Smoke run (60s each; any panic / abort / timeout fails the job)
        # Run from the repo root — cargo-fuzz finds the ./fuzz crate itself.
        # Bounded so it gates PRs without dominating CI. A reproducer for any
        # crash is written under fuzz/artifacts/ and the non-zero exit fails the
        # job. The weekly `fuzz-nightly` job runs a longer batch.
        run: |
          cargo fuzz run lex_parse_eval -- -max_total_time=60 -rss_limit_mb=2048
          cargo fuzz run lex_parse_compile -- -max_total_time=60 -rss_limit_mb=2048
          cargo fuzz run pretty_roundtrip -- -max_total_time=60 -rss_limit_mb=2048

  fuzz-nightly:
    name: fuzz (weekly extended)
    runs-on: ubuntu-latest
    # Weekly cron above, plus manual dispatch. Longer per-target budget than the
    # per-PR smoke; same crash-is-a-finding contract.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1')
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus from examples
        run: |
          for t in lex_parse_eval lex_parse_compile pretty_roundtrip; do
            mkdir -p "fuzz/corpus/$t"
            for f in $(find examples -name '*.mimz'); do cp "$f" "fuzz/corpus/$t/${f//\//_}"; done
          done

      - name: Extended run (10 min each target)
        run: |
          cargo fuzz run lex_parse_eval -- -max_total_time=600 -rss_limit_mb=2048
          cargo fuzz run lex_parse_compile -- -max_total_time=600 -rss_limit_mb=2048
          cargo fuzz run pretty_roundtrip -- -max_total_time=600 -rss_limit_mb=2048

  docs:
    name: markdown lint + format
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v23

      - name: Markdown format check
        run: npx --yes prettier --check "**/*.md"
