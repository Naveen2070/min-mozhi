# Localized error-message catalog (Tamil + Tanglish) — spec/04 §5.
#
# DATA, not code (same doctrine as keywords.toml / case_suffixes.toml): the
# engineering mechanism in src/morph.rs reads this table; the native-speaker
# panel edits the table, never the code. Authored by native speakers (v1,
# 2026-06-15) and consistent with the v1 keyword set.
#
# English is NOT here — it is the verbatim fallback (the inline `Diag.msg`), so a
# code with no entry below renders in English unchanged. Only the two localized
# flavors live here, and a covered code must define BOTH (a sync guard enforces
# it). Every key must be a real checker code from `diag::ALL_CHECKER_CODES`.
#
# Templates are plain text with interpolation tokens filled by `morph::fill`:
#   {name}        the bare identifier the diagnostic underlines
#   {name.acc}    accusative (-ஐ)      {name.dat}   dative (-க்கு)
#   {name.loc}    locative (-இல்)      {name.inst}  instrumental (-ஆல்)
# Named tokens like {expected}/{found}/{op} are filled from a diagnostic's
# structured args (see Diag::with_arg); codes needing those are added in step 2.

