# Min-Mozhi trilingual keyword table Рђћ THE source of truth for keyword words.
# spec/03-keywords-trilingual.md. One CANONICAL spelling per column; a column
# may also carry extra accepted spellings in an optional `<column>_aliases`
# list (e.g. `en_aliases`). Aliases lex to the same token; future tooling
# (`mimz translate`, `mimz fmt`) normalizes them to the canonical spelling.
#
# Keyword set: v1 (2026-06-15) Рђћ Tanglish/Tamil columns FINALIZED by native-speaker
# review (Phase 0 closed). Frozen for v1; spellings may change in a future v2.
# Changing a word here is a data change Рђћ no compiler code is touched.
#
# Columns: en = English (frozen) ┬и tanglish = romanized Tamil ┬и tamil = Tamil script

# Keyword-set version. Bumped when canonical spellings change (v1 Рєњ v2 Рђд).
version = 1

# Reserved for the future Рђћ using these is a compile error suggesting why.
# (Must stay above the first [keywords.*] table: top-level TOML keys.)
# Lines 2РђЊ3 are the v0.3 security/DX backlog; line 4 the section 8 deep-triage words
# (fixed-point, contracts) Рђћ see docs/Ideas/language_plan.md section 9. Reserved now
# so v0.1 programs cannot claim them, untranslated until each feature lands
# (spec/03 section "Reserved words").
reserved = [
  "sync", "inout", "struct",
  "secret", "declassify", "default", "pipeline", "interface", "chan", "prove", "await",
  "fixed", "requires", "ensures",
  # Combinational functions (Phase 2 RTL parity; also unblocks the pipe `|>`).
  # Both spellings reserved pre-v0.1.0 freeze so no program can claim either;
  # canonical TBD when the feature lands (likely `fn` + `function` alias).
  # English-only until native review supplies Tamil (R11).
  "fn", "function",
  # Parked for a future controlled `for`-loop (v1 reserved both spellings so no
  # program can claim them before the feature lands). `repeat`/Я««Я»ђЯ«БЯ»ЇЯ«ЪЯ»ЂЯ««Я»Ї stays the unroll.
  "suzhal", "Я«џЯ»ЂЯ«┤Я«▓Я»Ї",
]

